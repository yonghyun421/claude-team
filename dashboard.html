<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>밈키 백과 - 팀 대시보드</title>
  <style>
    :root {
      --bg: #0f0f23;
      --surface: #1a1a2e;
      --surface-2: #232342;
      --border: #2d2d5e;
      --text: #e0e0ff;
      --text-dim: #8888aa;
      --accent: #6c5ce7;
      --accent-2: #a29bfe;
      --green: #00b894;
      --yellow: #fdcb6e;
      --red: #ff6b6b;
      --orange: #e17055;
      --blue: #74b9ff;
      --pink: #fd79a8;
      --radius: 12px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* 헤더 */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo {
      font-size: 20px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--pink));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .sprint-badge {
      background: var(--accent);
      color: white;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }

    .header-stats {
      display: flex;
      gap: 24px;
      font-size: 13px;
    }

    .stat { display: flex; align-items: center; gap: 6px; }
    .stat-value { font-weight: 700; font-size: 16px; }
    .stat-label { color: var(--text-dim); }

    /* 탭 네비게이션 */
    .tabs {
      display: flex;
      gap: 4px;
      padding: 12px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .tab {
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-dim);
      border: none;
      background: none;
      transition: all 0.2s;
    }

    .tab:hover { background: var(--surface-2); color: var(--text); }
    .tab.active { background: var(--accent); color: white; }

    /* 메인 컨텐츠 */
    .main { padding: 24px; }

    /* 팀원 그리드 */
    .team-section { margin-bottom: 32px; }
    .section-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .team-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
    }

    .member-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }

    .member-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(108, 92, 231, 0.15);
    }

    .member-card.working { border-left: 3px solid var(--green); }
    .member-card.idle { border-left: 3px solid var(--text-dim); }
    .member-card.done { border-left: 3px solid var(--blue); }
    .member-card.blocked { border-left: 3px solid var(--red); }

    .member-top {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .member-info { flex: 1; min-width: 0; }
    .member-name { font-weight: 700; font-size: 14px; }
    .member-role { font-size: 11px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-dot.working { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .status-dot.idle { background: var(--text-dim); }
    .status-dot.done { background: var(--blue); }
    .status-dot.blocked { background: var(--red); box-shadow: 0 0 6px var(--red); }

    .member-task {
      font-size: 12px;
      color: var(--text-dim);
      padding: 8px;
      background: var(--surface-2);
      border-radius: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .member-task.active { color: var(--green); }

    /* 칸반 보드 */
    .kanban {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      min-height: 400px;
    }

    .kanban-col {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 16px;
      border: 1px solid var(--border);
    }

    .kanban-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .kanban-title {
      font-size: 13px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .kanban-count {
      background: var(--surface-2);
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      color: var(--text-dim);
    }

    .task-card {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 8px;
      cursor: grab;
      transition: all 0.2s;
    }

    .task-card:hover {
      border-color: var(--accent);
    }

    .task-card.dragging {
      opacity: 0.5;
      transform: rotate(2deg);
    }

    .task-id {
      font-size: 10px;
      color: var(--accent-2);
      font-weight: 600;
      margin-bottom: 4px;
    }

    .task-title {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 8px;
      line-height: 1.4;
    }

    .task-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .task-assignee {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: var(--text-dim);
    }

    .task-assignee-avatar {
      width: 20px;
      height: 20px;
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
    }

    .task-priority {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      font-weight: 600;
    }

    .task-priority.p0 { background: rgba(255, 107, 107, 0.2); color: var(--red); }
    .task-priority.p1 { background: rgba(253, 203, 110, 0.2); color: var(--yellow); }
    .task-priority.p2 { background: rgba(116, 185, 255, 0.2); color: var(--blue); }

    /* 스프린트 진행률 */
    .sprint-progress {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 24px;
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .progress-title { font-size: 15px; font-weight: 700; }
    .progress-pct { font-size: 24px; font-weight: 800; color: var(--accent); }

    .progress-bar {
      height: 8px;
      background: var(--surface-2);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 16px;
    }

    .progress-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.5s ease;
      background: linear-gradient(90deg, var(--accent), var(--pink));
    }

    .progress-phases {
      display: flex;
      gap: 12px;
    }

    .phase {
      flex: 1;
      text-align: center;
      padding: 8px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
    }

    .phase.current { background: var(--accent); color: white; }
    .phase.completed { background: rgba(0, 184, 148, 0.15); color: var(--green); }
    .phase.upcoming { background: var(--surface-2); color: var(--text-dim); }

    /* 타임라인 */
    .timeline {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }

    .timeline-item {
      display: flex;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }

    .timeline-item:last-child { border-bottom: none; }

    .timeline-time {
      color: var(--text-dim);
      font-size: 11px;
      min-width: 60px;
      flex-shrink: 0;
    }

    .timeline-avatar {
      width: 24px;
      height: 24px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      flex-shrink: 0;
    }

    .timeline-text { flex: 1; }
    .timeline-text strong { color: var(--accent-2); }

    /* 숨김 탭 */
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* 모달 */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.active { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      width: 500px;
      max-width: 90vw;
      max-height: 80vh;
      overflow-y: auto;
      padding: 24px;
    }

    .modal-title { font-size: 18px; font-weight: 800; margin-bottom: 16px; }

    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 12px; font-weight: 600; color: var(--text-dim); margin-bottom: 6px; }

    .form-input, .form-select, .form-textarea {
      width: 100%;
      padding: 10px 12px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      outline: none;
    }

    .form-input:focus, .form-select:focus, .form-textarea:focus {
      border-color: var(--accent);
    }

    .form-textarea { min-height: 80px; resize: vertical; font-family: inherit; }

    .btn {
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }

    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: var(--accent-2); }
    .btn-ghost { background: none; color: var(--text-dim); }
    .btn-ghost:hover { color: var(--text); }

    .btn-group { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

    /* 반응형 */
    @media (max-width: 768px) {
      .kanban { grid-template-columns: 1fr; }
      .team-grid { grid-template-columns: repeat(2, 1fr); }
      .header-stats { display: none; }
      .progress-phases { flex-wrap: wrap; }
    }
  </style>
</head>
<body>

  <!-- 헤더 -->
  <div class="header">
    <div class="header-left">
      <div class="logo">밈키 백과 팀</div>
      <span class="sprint-badge" id="sprintBadge">Sprint 1</span>
    </div>
    <div class="header-stats">
      <div class="stat">
        <span class="stat-value" id="totalTasks">0</span>
        <span class="stat-label">전체</span>
      </div>
      <div class="stat">
        <span class="stat-value" style="color: var(--green)" id="doneTasks">0</span>
        <span class="stat-label">완료</span>
      </div>
      <div class="stat">
        <span class="stat-value" style="color: var(--yellow)" id="progressTasks">0</span>
        <span class="stat-label">진행중</span>
      </div>
      <div class="stat">
        <span class="stat-value" style="color: var(--text-dim)" id="todoTasks">0</span>
        <span class="stat-label">대기</span>
      </div>
    </div>
  </div>

  <!-- 탭 -->
  <div class="tabs">
    <button class="tab active" data-tab="team">팀원</button>
    <button class="tab" data-tab="board">칸반 보드</button>
    <button class="tab" data-tab="timeline">타임라인</button>
    <button class="tab" onclick="openAddTask()" style="margin-left:auto; color: var(--accent)">+ 태스크 추가</button>
  </div>

  <div class="main">
    <!-- 스프린트 진행률 -->
    <div class="sprint-progress">
      <div class="progress-header">
        <div class="progress-title">Sprint 1 진행률</div>
        <div class="progress-pct" id="progressPct">0%</div>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
      </div>
      <div class="progress-phases">
        <div class="phase current" id="phase1">Phase 1: 인프라/기반</div>
        <div class="phase upcoming" id="phase2">Phase 2: 핵심 기능</div>
        <div class="phase upcoming" id="phase3">Phase 3: 트렌드/UX</div>
        <div class="phase upcoming" id="phase4">Phase 4: 마무리</div>
      </div>
    </div>

    <!-- 팀원 탭 -->
    <div class="tab-content active" id="tab-team">
      <div class="team-section">
        <div class="section-title">🧠 전략/판단 — Opus</div>
        <div class="team-grid" id="team-strategy"></div>
      </div>
      <div class="team-section">
        <div class="section-title">🎨 프론트엔드 — Sonnet</div>
        <div class="team-grid" id="team-frontend"></div>
      </div>
      <div class="team-section">
        <div class="section-title">⚙️ 백엔드 — Sonnet</div>
        <div class="team-grid" id="team-backend"></div>
      </div>
      <div class="team-section">
        <div class="section-title">🚀 인프라/성능 — Sonnet</div>
        <div class="team-grid" id="team-infra"></div>
      </div>
      <div class="team-section">
        <div class="section-title">✅ 품질/유지보수 — Sonnet</div>
        <div class="team-grid" id="team-qa"></div>
      </div>
    </div>

    <!-- 칸반 보드 탭 -->
    <div class="tab-content" id="tab-board">
      <div class="kanban">
        <div class="kanban-col" id="col-todo">
          <div class="kanban-header">
            <div class="kanban-title">📋 대기 <span class="kanban-count" id="count-todo">0</span></div>
          </div>
          <div class="kanban-cards" id="cards-todo"></div>
        </div>
        <div class="kanban-col" id="col-progress">
          <div class="kanban-header">
            <div class="kanban-title">🔨 진행중 <span class="kanban-count" id="count-progress">0</span></div>
          </div>
          <div class="kanban-cards" id="cards-progress"></div>
        </div>
        <div class="kanban-col" id="col-review">
          <div class="kanban-header">
            <div class="kanban-title">👀 리뷰 <span class="kanban-count" id="count-review">0</span></div>
          </div>
          <div class="kanban-cards" id="cards-review"></div>
        </div>
        <div class="kanban-col" id="col-done">
          <div class="kanban-header">
            <div class="kanban-title">✅ 완료 <span class="kanban-count" id="count-done">0</span></div>
          </div>
          <div class="kanban-cards" id="cards-done"></div>
        </div>
      </div>
    </div>

    <!-- 타임라인 탭 -->
    <div class="tab-content" id="tab-timeline">
      <div class="timeline" id="timeline"></div>
    </div>
  </div>

  <!-- 태스크 추가 모달 -->
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <div class="modal-title">태스크 추가</div>
      <div class="form-group">
        <label class="form-label">태스크 제목</label>
        <input class="form-input" id="taskTitle" placeholder="예: DB 스키마 설계">
      </div>
      <div class="form-group">
        <label class="form-label">담당 에이전트</label>
        <select class="form-select" id="taskAssignee"></select>
      </div>
      <div class="form-group">
        <label class="form-label">우선순위</label>
        <select class="form-select" id="taskPriority">
          <option value="p0">P0 - 필수</option>
          <option value="p1">P1 - 중요</option>
          <option value="p2">P2 - 선택</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">설명</label>
        <textarea class="form-textarea" id="taskDesc" placeholder="태스크 상세 설명..."></textarea>
      </div>
      <div class="btn-group">
        <button class="btn btn-ghost" onclick="closeModal()">취소</button>
        <button class="btn btn-primary" onclick="addTask()">추가</button>
      </div>
    </div>
  </div>

  <!-- 태스크 상세 모달 -->
  <div class="modal-overlay" id="taskModal">
    <div class="modal">
      <div id="taskModalContent"></div>
      <div class="btn-group">
        <button class="btn btn-ghost" onclick="closeTaskModal()">닫기</button>
        <button class="btn btn-ghost" style="color: var(--red)" onclick="deleteCurrentTask()">삭제</button>
        <button class="btn btn-primary" id="taskStatusBtn" onclick="advanceTask()">다음 단계로</button>
      </div>
    </div>
  </div>

<script>
  // 팀원 데이터
  const members = [
    { id: 'pm', name: 'PM', role: '요구사항 · 우선순위', group: 'strategy', emoji: '📊', color: '#6c5ce7' },
    { id: 'planner', name: 'Planner', role: '구현 계획 · 태스크 분해', group: 'strategy', emoji: '📋', color: '#a29bfe' },
    { id: 'architect', name: 'Architect', role: '시스템 설계 · 기술 결정', group: 'strategy', emoji: '🏗️', color: '#0984e3' },
    { id: 'code-reviewer', name: 'Code Reviewer', role: '코드 품질 리뷰', group: 'strategy', emoji: '🔍', color: '#00cec9' },
    { id: 'security-reviewer', name: 'Security', role: '보안 취약점 탐지', group: 'strategy', emoji: '🛡️', color: '#d63031' },
    { id: 'page-builder', name: 'Page Builder', role: 'Next.js 라우팅 · 레이아웃', group: 'frontend', emoji: '📄', color: '#74b9ff' },
    { id: 'frontend', name: 'Frontend', role: 'React 컴포넌트 · 상태관리', group: 'frontend', emoji: '⚛️', color: '#00b894' },
    { id: 'ui-designer', name: 'UI Designer', role: '디자인 시스템 · 접근성', group: 'frontend', emoji: '🎨', color: '#fd79a8' },
    { id: 'form-specialist', name: 'Form Specialist', role: 'RHF + Zod · 멀티스텝 폼', group: 'frontend', emoji: '📝', color: '#fdcb6e' },
    { id: 'backend', name: 'Backend', role: 'API · Server Actions', group: 'backend', emoji: '🔧', color: '#e17055' },
    { id: 'auth-engineer', name: 'Auth Engineer', role: '인증/인가 · OAuth · RBAC', group: 'backend', emoji: '🔐', color: '#d63031' },
    { id: 'db-engineer', name: 'DB Engineer', role: '스키마 · 마이그레이션 · 쿼리', group: 'backend', emoji: '🗄️', color: '#6c5ce7' },
    { id: 'integrator', name: 'Integrator', role: '결제 · 웹훅 · 외부 API', group: 'backend', emoji: '🔗', color: '#00cec9' },
    { id: 'devops', name: 'DevOps', role: 'CI/CD · Docker · 배포', group: 'infra', emoji: '🚀', color: '#0984e3' },
    { id: 'performance', name: 'Performance', role: '번들 · Web Vitals · 캐싱', group: 'infra', emoji: '⚡', color: '#fdcb6e' },
    { id: 'tdd-guide', name: 'TDD Guide', role: 'TDD · 80%+ 커버리지', group: 'qa', emoji: '🧪', color: '#00b894' },
    { id: 'e2e-runner', name: 'E2E Runner', role: 'Playwright 테스트', group: 'qa', emoji: '🎭', color: '#a29bfe' },
    { id: 'build-error-resolver', name: 'Build Fixer', role: '빌드/타입 에러 수정', group: 'qa', emoji: '🔨', color: '#e17055' },
    { id: 'refactor-cleaner', name: 'Refactorer', role: '데드코드 · 리팩토링', group: 'qa', emoji: '🧹', color: '#74b9ff' },
    { id: 'doc-updater', name: 'Doc Writer', role: '문서화 · 코드맵', group: 'qa', emoji: '📚', color: '#fd79a8' },
  ];

  // Sprint 1 초기 태스크
  const initialTasks = [
    { id: 'T-1.1', title: 'Next.js 15 프로젝트 초기화', assignee: 'devops', priority: 'p0', status: 'todo', desc: 'App Router, TypeScript, Tailwind, ESLint, Prettier 설정' },
    { id: 'T-1.2', title: 'shadcn/ui 설치 및 테마 설정', assignee: 'ui-designer', priority: 'p0', status: 'todo', desc: '다크모드 포함 테마 커스터마이징' },
    { id: 'T-1.3', title: 'PostgreSQL + Prisma 설정', assignee: 'db-engineer', priority: 'p0', status: 'todo', desc: '개발/프로덕션 환경 분리' },
    { id: 'T-1.4', title: 'DB 스키마 설계 및 마이그레이션', assignee: 'db-engineer', priority: 'p0', status: 'todo', desc: 'User, Meme, Tag, Vote, MemeRevision 모델' },
    { id: 'T-1.5', title: 'Auth.js 설정 (Google/Kakao)', assignee: 'auth-engineer', priority: 'p0', status: 'todo', desc: 'OAuth 프로바이더 + 비로그인 IP 추적' },
    { id: 'T-1.6', title: 'Cloudflare R2 연동', assignee: 'backend', priority: 'p1', status: 'todo', desc: 'Presigned URL 이미지 업로드' },
    { id: 'T-1.7', title: '공통 레이아웃 구현', assignee: 'page-builder', priority: 'p0', status: 'todo', desc: 'Header, Footer, Sidebar, MobileNav' },
    { id: 'T-1.8', title: 'Zustand 스토어 초기 설정', assignee: 'frontend', priority: 'p1', status: 'todo', desc: 'UI 상태 (사이드바, 다크모드)' },
    { id: 'T-1.9', title: 'TanStack Query Provider 구성', assignee: 'frontend', priority: 'p1', status: 'todo', desc: '공통 훅 구조 및 Provider 설정' },
    { id: 'T-1.10', title: 'API 응답 포맷 및 에러 핸들링', assignee: 'backend', priority: 'p0', status: 'todo', desc: 'ApiResponse<T>, 미들웨어' },
    { id: 'T-1.11', title: '인프라 단위 테스트 작성', assignee: 'tdd-guide', priority: 'p1', status: 'todo', desc: 'DB, Auth, API 기반 테스트' },
  ];

  // 상태 관리 (dashboard-state.json + localStorage 하이브리드)
  const STORAGE_KEY = 'memeki-dashboard';
  const JSON_PATH = './dashboard-state.json';
  let lastJsonUpdate = null;
  let pollInterval = null;

  function loadState() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) return JSON.parse(saved);
    return { tasks: initialTasks, timeline: [], currentSprint: 1 };
  }

  function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  // dashboard-state.json에서 상태 동기화 (에이전트가 업데이트한 내용 반영)
  async function syncFromJson() {
    try {
      const res = await fetch(JSON_PATH + '?t=' + Date.now());
      if (!res.ok) return;
      const json = await res.json();

      // 업데이트 시각이 같으면 스킵
      if (json.updatedAt === lastJsonUpdate) return;
      lastJsonUpdate = json.updatedAt;

      // JSON의 태스크 상태를 현재 상태에 머지
      let changed = false;
      json.tasks.forEach(jTask => {
        const existing = state.tasks.find(t => t.id === jTask.id);
        if (existing) {
          if (existing.status !== jTask.status) {
            const oldStatus = existing.status;
            existing.status = jTask.status;
            const member = members.find(m => m.id === existing.assignee);
            addTimeline(`🤖 <strong>${member?.name}</strong>이(가) "${existing.title}" → ${statusName(jTask.status)} (자동)`);
            changed = true;
          }
          // 다른 필드도 동기화
          if (jTask.title) existing.title = jTask.title;
          if (jTask.desc) existing.desc = jTask.desc;
          if (jTask.assignee && existing.assignee !== jTask.assignee) existing.assignee = jTask.assignee;
        } else {
          // 새 태스크 추가
          state.tasks.push(jTask);
          const member = members.find(m => m.id === jTask.assignee);
          addTimeline(`🤖 새 태스크 "<strong>${jTask.title}</strong>" 자동 추가 → ${member?.name}`);
          changed = true;
        }
      });

      // JSON에서 삭제된 태스크 제거
      const jsonIds = new Set(json.tasks.map(t => t.id));
      const removed = state.tasks.filter(t => !jsonIds.has(t.id));
      if (removed.length > 0) {
        state.tasks = state.tasks.filter(t => jsonIds.has(t.id));
        removed.forEach(t => addTimeline(`🤖 태스크 "${t.title}" 자동 제거`));
        changed = true;
      }

      // JSON의 타임라인 항목도 머지
      if (json.timeline && json.timeline.length > 0) {
        json.timeline.forEach(item => {
          const exists = state.timeline.some(t => t.time === item.time && t.text === item.text);
          if (!exists) { state.timeline.push(item); changed = true; }
        });
      }

      if (json.currentSprint && json.currentSprint !== state.currentSprint) {
        state.currentSprint = json.currentSprint;
        document.getElementById('sprintBadge').textContent = `Sprint ${state.currentSprint}`;
        changed = true;
      }

      if (changed) {
        saveState();
        renderAll();
        showSyncIndicator();
      }
    } catch { /* JSON 파일 없으면 무시 (file:// 프로토콜 등) */ }
  }

  function showSyncIndicator() {
    const badge = document.getElementById('sprintBadge');
    const original = badge.textContent;
    badge.textContent = '🔄 동기화됨';
    badge.style.background = 'var(--green)';
    setTimeout(() => {
      badge.textContent = original;
      badge.style.background = '';
    }, 2000);
  }

  // 3초마다 JSON 폴링
  function startPolling() {
    syncFromJson(); // 초기 로드
    pollInterval = setInterval(syncFromJson, 3000);
  }

  function stopPolling() {
    if (pollInterval) clearInterval(pollInterval);
  }

  let state = loadState();
  let currentTaskId = null;

  // 팀원 렌더링
  function renderMembers() {
    const groups = { strategy: 'team-strategy', frontend: 'team-frontend', backend: 'team-backend', infra: 'team-infra', qa: 'team-qa' };

    Object.values(groups).forEach(id => { document.getElementById(id).innerHTML = ''; });

    members.forEach(m => {
      const task = state.tasks.find(t => t.assignee === m.id && t.status === 'progress');
      const doneCount = state.tasks.filter(t => t.assignee === m.id && t.status === 'done').length;
      const totalCount = state.tasks.filter(t => t.assignee === m.id).length;
      const statusClass = task ? 'working' : (doneCount > 0 && doneCount === totalCount ? 'done' : 'idle');

      const card = document.createElement('div');
      card.className = `member-card ${statusClass}`;
      card.innerHTML = `
        <div class="member-top">
          <div class="avatar" style="background: ${m.color}22; color: ${m.color}">${m.emoji}</div>
          <div class="member-info">
            <div class="member-name">${m.name}</div>
            <div class="member-role">${m.role}</div>
          </div>
          <div class="status-dot ${statusClass}"></div>
        </div>
        <div class="member-task ${task ? 'active' : ''}">${task ? task.title : (totalCount === 0 ? '배정된 태스크 없음' : `${doneCount}/${totalCount} 완료`)}</div>
      `;
      document.getElementById(groups[m.group]).appendChild(card);
    });
  }

  // 칸반 보드 렌더링
  function renderKanban() {
    const cols = { todo: 'cards-todo', progress: 'cards-progress', review: 'cards-review', done: 'cards-done' };
    Object.values(cols).forEach(id => { document.getElementById(id).innerHTML = ''; });

    Object.entries(cols).forEach(([status, containerId]) => {
      const tasks = state.tasks.filter(t => t.status === status);
      document.getElementById(`count-${status === 'progress' ? 'progress' : status}`).textContent = tasks.length;

      tasks.forEach(t => {
        const member = members.find(m => m.id === t.assignee);
        const card = document.createElement('div');
        card.className = 'task-card';
        card.draggable = true;
        card.dataset.taskId = t.id;
        card.onclick = () => openTaskDetail(t.id);
        card.innerHTML = `
          <div class="task-id">${t.id}</div>
          <div class="task-title">${t.title}</div>
          <div class="task-meta">
            <div class="task-assignee">
              <div class="task-assignee-avatar" style="background: ${member?.color}22; color: ${member?.color}">${member?.emoji || '?'}</div>
              ${member?.name || t.assignee}
            </div>
            <span class="task-priority ${t.priority}">${t.priority.toUpperCase()}</span>
          </div>
        `;

        card.addEventListener('dragstart', e => {
          e.dataTransfer.setData('text/plain', t.id);
          card.classList.add('dragging');
        });
        card.addEventListener('dragend', () => card.classList.remove('dragging'));

        document.getElementById(containerId).appendChild(card);
      });
    });

    // 드롭 영역
    document.querySelectorAll('.kanban-col').forEach(col => {
      col.addEventListener('dragover', e => e.preventDefault());
      col.addEventListener('drop', e => {
        e.preventDefault();
        const taskId = e.dataTransfer.getData('text/plain');
        const newStatus = col.id.replace('col-', '');
        const task = state.tasks.find(t => t.id === taskId);
        if (task && task.status !== newStatus) {
          const oldStatus = task.status;
          task.status = newStatus;
          const member = members.find(m => m.id === task.assignee);
          addTimeline(`<strong>${member?.name}</strong>이(가) "${task.title}"을(를) ${statusName(newStatus)}(으)로 이동`);
          saveState();
          renderAll();
        }
      });
    });
  }

  function statusName(s) {
    return { todo: '대기', progress: '진행중', review: '리뷰', done: '완료' }[s] || s;
  }

  // 타임라인 렌더링
  function renderTimeline() {
    const el = document.getElementById('timeline');
    if (state.timeline.length === 0) {
      el.innerHTML = '<div style="text-align:center; padding:40px; color:var(--text-dim)">아직 활동이 없습니다</div>';
      return;
    }
    el.innerHTML = state.timeline.slice().reverse().map(item => {
      return `
        <div class="timeline-item">
          <div class="timeline-time">${item.time}</div>
          <div class="timeline-text">${item.text}</div>
        </div>
      `;
    }).join('');
  }

  // 통계 업데이트
  function updateStats() {
    const total = state.tasks.length;
    const done = state.tasks.filter(t => t.status === 'done').length;
    const progress = state.tasks.filter(t => t.status === 'progress' || t.status === 'review').length;
    const todo = state.tasks.filter(t => t.status === 'todo').length;

    document.getElementById('totalTasks').textContent = total;
    document.getElementById('doneTasks').textContent = done;
    document.getElementById('progressTasks').textContent = progress;
    document.getElementById('todoTasks').textContent = todo;

    const pct = total > 0 ? Math.round((done / total) * 100) : 0;
    document.getElementById('progressPct').textContent = pct + '%';
    document.getElementById('progressFill').style.width = pct + '%';
  }

  // 타임라인 항목 추가
  function addTimeline(text) {
    const now = new Date();
    const time = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
    state.timeline.push({ time, text });
    if (state.timeline.length > 50) state.timeline = state.timeline.slice(-50);
  }

  // 탭 전환
  document.querySelectorAll('.tab[data-tab]').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab[data-tab]').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
    });
  });

  // 모달
  function openAddTask() {
    const select = document.getElementById('taskAssignee');
    select.innerHTML = members.map(m => `<option value="${m.id}">${m.emoji} ${m.name} - ${m.role}</option>`).join('');
    document.getElementById('modal').classList.add('active');
  }

  function closeModal() { document.getElementById('modal').classList.remove('active'); }

  function addTask() {
    const title = document.getElementById('taskTitle').value.trim();
    if (!title) return;

    const taskNum = state.tasks.length + 1;
    const task = {
      id: `T-${state.currentSprint}.${taskNum}`,
      title,
      assignee: document.getElementById('taskAssignee').value,
      priority: document.getElementById('taskPriority').value,
      status: 'todo',
      desc: document.getElementById('taskDesc').value.trim(),
    };

    state.tasks.push(task);
    const member = members.find(m => m.id === task.assignee);
    addTimeline(`새 태스크 "<strong>${task.title}</strong>" 추가 → ${member?.name}`);
    saveState();
    renderAll();
    closeModal();

    document.getElementById('taskTitle').value = '';
    document.getElementById('taskDesc').value = '';
  }

  // 태스크 상세
  function openTaskDetail(taskId) {
    currentTaskId = taskId;
    const task = state.tasks.find(t => t.id === taskId);
    if (!task) return;

    const member = members.find(m => m.id === task.assignee);
    const content = document.getElementById('taskModalContent');
    content.innerHTML = `
      <div class="modal-title">${task.title}</div>
      <div style="display:flex; gap:12px; margin-bottom:16px; flex-wrap:wrap;">
        <span class="task-priority ${task.priority}" style="font-size:12px">${task.priority.toUpperCase()}</span>
        <span style="font-size:12px; color:var(--text-dim)">상태: <strong style="color:var(--text)">${statusName(task.status)}</strong></span>
        <span style="font-size:12px; color:var(--text-dim)">ID: <strong style="color:var(--accent-2)">${task.id}</strong></span>
      </div>
      <div style="display:flex; align-items:center; gap:8px; margin-bottom:16px;">
        <div class="avatar" style="background: ${member?.color}22; color: ${member?.color}; width:32px; height:32px; font-size:14px">${member?.emoji}</div>
        <div>
          <div style="font-size:13px; font-weight:600">${member?.name}</div>
          <div style="font-size:11px; color:var(--text-dim)">${member?.role}</div>
        </div>
      </div>
      ${task.desc ? `<div style="font-size:13px; color:var(--text-dim); padding:12px; background:var(--surface-2); border-radius:8px">${task.desc}</div>` : ''}
    `;

    const btn = document.getElementById('taskStatusBtn');
    const nextStatus = { todo: 'progress', progress: 'review', review: 'done', done: null };
    if (nextStatus[task.status]) {
      btn.textContent = `→ ${statusName(nextStatus[task.status])}`;
      btn.style.display = 'block';
    } else {
      btn.style.display = 'none';
    }

    document.getElementById('taskModal').classList.add('active');
  }

  function closeTaskModal() { document.getElementById('taskModal').classList.remove('active'); currentTaskId = null; }

  function advanceTask() {
    if (!currentTaskId) return;
    const task = state.tasks.find(t => t.id === currentTaskId);
    if (!task) return;

    const next = { todo: 'progress', progress: 'review', review: 'done' };
    if (next[task.status]) {
      task.status = next[task.status];
      const member = members.find(m => m.id === task.assignee);
      addTimeline(`<strong>${member?.name}</strong>이(가) "${task.title}" → ${statusName(task.status)}`);
      saveState();
      renderAll();
      closeTaskModal();
    }
  }

  function deleteCurrentTask() {
    if (!currentTaskId) return;
    if (!confirm('이 태스크를 삭제할까요?')) return;
    state.tasks = state.tasks.filter(t => t.id !== currentTaskId);
    addTimeline(`태스크 "${currentTaskId}" 삭제됨`);
    saveState();
    renderAll();
    closeTaskModal();
  }

  // 모달 외부 클릭 닫기
  document.getElementById('modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
  document.getElementById('taskModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeTaskModal(); });

  // 전체 렌더링
  function renderAll() {
    renderMembers();
    renderKanban();
    renderTimeline();
    updateStats();
  }

  // 초기화
  renderAll();
  startPolling(); // dashboard-state.json 자동 동기화 시작

  // 키보드 단축키
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { closeModal(); closeTaskModal(); }
    if (e.key === 'n' && e.ctrlKey) { e.preventDefault(); openAddTask(); }
  });
</script>
</body>
</html>
